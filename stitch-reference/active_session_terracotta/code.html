<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    body {
        background-color: #0D0A08;
    }
    .breath-pacer {
        box-shadow: 0 0 120px 20px rgba(196, 82, 42, 0.25);
        background: radial-gradient(circle, #C4522A 0%, #842600 100%);
    }
    .tide-progress {
        background: linear-gradient(to top, #1e1b18 0%, #161310 100%);
    }
    .tide-fill {
        height: 40%; /* Mock state */
        background-color: #C4522A;
        opacity: 0.6;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-hidden">
<!-- Navigation Shell: TopAppBar consistency with COMPONENTS_8 -->
<header class="flex justify-between items-center w-full px-8 py-10 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline-variant cursor-pointer hover:text-primary transition-colors duration-700">close</span>
</div>
<h1 class="text-2xl font-headline italic font-bold tracking-widest text-primary uppercase">ARAMZOR</h1>
<div class="w-6"></div> <!-- Balance spacer -->
</header>
<!-- Main Session Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative px-6">
<!-- Phase Name -->
<div class="mb-24 text-center">
<h2 class="font-headline italic text-5xl md:text-7xl font-bold tracking-[0.2em] text-on-surface leading-tight">
        THE ZOR
      </h2>
</div>
<!-- The Aramzor Breath Pacer - Updated to Glowing Ember -->
<div class="relative flex items-center justify-center">
<!-- Visual Glow Layers -->
<div class="absolute w-[300px] h-[300px] rounded-full opacity-25 blur-[120px] bg-primary"></div>
<!-- The Core Pacer -->
<div class="breath-pacer w-64 h-64 md:w-80 md:h-80 rounded-full flex items-center justify-center">
<!-- Inner Ring -->
<div class="w-[95%] h-[95%] rounded-full border border-white/10 flex items-center justify-center">
<div class="w-[90%] h-[90%] rounded-full border border-white/5"></div>
</div>
</div>
</div>
<!-- Instruction Text -->
<div class="mt-24 text-center">
<p class="font-label text-sm md:text-base uppercase tracking-[0.4em] text-outline font-light">
        Inhale through your nose
      </p>
</div>
</main>
<!-- Vertical Tide Progress -->
<aside class="fixed right-0 top-0 h-full w-1 tide-progress">
<div class="w-full absolute bottom-0 tide-fill transition-all duration-[4000ms] ease-in-out"></div>
</aside>
<!-- Minimal Bottom Feedback/Meta -->
<footer class="w-full py-16 flex flex-col items-center justify-center space-y-8 z-50">
<div class="flex items-center gap-12">
<div class="flex flex-col items-center gap-2">
<span class="text-[10px] uppercase tracking-[0.2em] font-medium text-outline-variant">Pattern</span>
<span class="text-xs uppercase tracking-[0.15em] font-semibold text-primary">4-4-4-4</span>
</div>
<div class="h-8 w-[1px] bg-outline-variant/20"></div>
<div class="flex flex-col items-center gap-2">
<span class="text-[10px] uppercase tracking-[0.2em] font-medium text-outline-variant">Depth</span>
<span class="text-xs uppercase tracking-[0.15em] font-semibold text-primary">Deep Diaphragm</span>
</div>
</div>
<div class="pt-8">
<button class="bg-transparent border border-outline-variant/30 px-10 py-4 text-[11px] tracking-[0.3em] font-medium text-on-surface hover:border-primary hover:text-primary transition-all duration-700 uppercase">
            Pause Practice
        </button>
</div>
</footer>
<!-- Decorative Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
<img class="w-full h-full object-cover" data-alt="fine organic film grain texture with subtle noise for a tactile cinematic feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWqlyx9ds6WR8uFER0k5px9J7rDRe2a7ZybXnofGaOcdErRIbFOykJvh4jvlwoYZm1qpiCA8jVvRUYE1_f8Aks763oYYGVbaY5S-TeH5aY4vQQbObU15HxHR7oYuW7v97JpiCdigImQXxjWFw2xlJviUyuxG5N6hOkpEP8LUyESu9_ISiwtqi_zAzxhbyOilyYPbHa95CxcvfxmkzBtNHPeHevn_2IhbNEt9VaE7HbOVIbohDCyXF91pKdxooInkfqWeEkJHY6f9k"/>
</div>
